[features]
default = []
legacy-http-tests = ["dep:dom-wallet-chain", "dep:dom-wallet-protocol"]

[dependencies]
dom-consensus.workspace = true
dom-crypto.workspace = true
dom-serialization.workspace = true
dom-wallet-chain = { path = "../dom-wallet-chain", optional = true }
dom-wallet-core-protocol = { path = "../dom-wallet-core-protocol" }
dom-wallet-core-recovery = { path = "../dom-wallet-core-recovery" }
dom-wallet-core-restore = { path = "../dom-wallet-core-restore" }
