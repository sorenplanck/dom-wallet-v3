dom-wallet-core-api.workspace = true
dom-wallet-core-sync = { path = "../dom-wallet-core-sync" }
dom-wallet-crypto = { path = "../dom-wallet-crypto" }
dom-wallet-domain = { path = "../dom-wallet-domain" }
dom-wallet-embedded-core = { path = "../dom-wallet-embedded-core" }
dom-wallet-production-backend = { path = "../dom-wallet-production-backend" }
dom-wallet-protocol = { path = "../dom-wallet-protocol", optional = true }
dom-wallet-storage = { path = "../dom-wallet-storage" }
hex.workspace = true
